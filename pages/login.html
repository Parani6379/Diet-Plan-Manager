<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MealMatrix</title>
  <meta name="description" content="Login to your MealMatrix account to access your personalized meal plans." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #e7ecf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      text-decoration: none;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .mm-header {
      height: 72px;
      padding: 0 36px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 0 #e5e7eb;
      flex-shrink: 0;
    }

    .mm-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: #1f2933;
      letter-spacing: 0.02em;
    }

    .mm-logo-icon {
      position: relative;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 0%, #b1f4cf, #22c55e);
      box-shadow: 0 2px 10px rgba(34, 197, 94, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .mm-logo-icon::after {
      content: 'MM';
      position: absolute;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.62rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .mm-nav {
      display: flex;
      gap: 24px;
    }

    .mm-nav-link {
      font-size: 0.9rem;
      color: #6b7280;
      font-weight: 500;
      transition: color 160ms ease-out;
    }

    .mm-nav-link:hover {
      color: #1f2933;
    }

    .mm-login-btn {
      visibility: hidden;
      /* hide on the login page itself */
    }

    /* ── Main / Page Body ────────────────────────────────────────── */
    .page-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Auth card ────────────────────────────────────────────────── */
    .auth-card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.14);
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00d26a, #00b75c);
      border-radius: 28px 28px 0 0;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .auth-logo-dot {
      position: relative;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 0%, #b1f4cf, #22c55e);
      box-shadow: 0 2px 10px rgba(34, 197, 94, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .auth-logo-dot::after {
      content: 'MM';
      position: absolute;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.6rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.03em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .auth-logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1f2933;
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f2933;
      text-align: center;
      margin: 0 0 6px;
    }

    .auth-sub {
      font-size: 0.88rem;
      color: #6b7280;
      text-align: center;
      margin: 0 0 28px;
    }

    /* ── Fields ────────────────────────────────────────────────────── */
    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .auth-field label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #374151;
      letter-spacing: 0.03em;
    }

    .auth-field input {
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #1f2933;
      background: #f9fafb;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    .auth-field input:focus {
      border-color: #00d26a;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0, 210, 106, 0.12);
    }

    /* ── Messages ──────────────────────────────────────────────────── */
    .auth-error {
      font-size: 0.82rem;
      color: #dc2626;
      text-align: center;
      min-height: 18px;
      margin-bottom: 4px;
    }

    .auth-success {
      font-size: 0.82rem;
      color: #00b75c;
      text-align: center;
      min-height: 18px;
      margin-bottom: 4px;
    }

    /* ── Submit btn ─────────────────────────────────────────────────── */
    .auth-submit {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #00d26a, #00b75c);
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 210, 106, 0.4);
      transition: transform .15s, box-shadow .15s;
      letter-spacing: 0.02em;
    }

    .auth-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(0, 210, 106, 0.55);
    }

    .auth-submit:disabled {
      opacity: .65;
      cursor: not-allowed;
      transform: none;
    }

    .auth-note {
      text-align: center;
      font-size: 0.82rem;
      color: #6b7280;
      margin-top: 18px;
    }

    .auth-note a {
      color: #00b75c;
      font-weight: 600;
    }

    .auth-note a:hover {
      text-decoration: underline;
    }

    /* ── Spinner ────────────────────────────────────────────────────── */
    .auth-spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- ── HEADER ──────────────────────────────────────────────────── -->
  <header class="mm-header">
    <a href="/" class="mm-logo">
      <span class="mm-logo-icon"></span>
      <span>MealMatrix</span>
    </a>
    <nav class="mm-nav">
      <a href="/" class="mm-nav-link">Home</a>
      <a href="/pages/plans.html" class="mm-nav-link">Plans</a>
      <a href="/pages/about.html" class="mm-nav-link">About</a>
      <a href="/pages/help.html" class="mm-nav-link">Help</a>
    </nav>
    <a href="/pages/login.html" class="mm-login-btn">Login</a>
  </header>

  <!-- ── MAIN ───────────────────────────────────────────────────── -->
  <main class="page-body">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-dot"></span>
        <span class="auth-logo-text">MealMatrix</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Login to your MealMatrix account</p>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="auth-field">
          <label for="login-id">Email or Phone</label>
          <input id="login-id" type="text" placeholder="email@example.com or +91XXXXXXXXXX" required />
        </div>
        <div class="auth-field">
          <label for="login-pw">Password</label>
          <input id="login-pw" type="password" placeholder="Your password" required />
        </div>

        <p class="auth-error" id="login-error"></p>
        <p class="auth-success" id="login-success"></p>

        <button type="submit" class="auth-submit" id="btn-login">Login</button>

        <p class="auth-note">
          <button type="button" id="btn-forgot"
            style="background:none;border:none;padding:0;color:#00b75c;font-weight:600;font-size:0.82rem;cursor:pointer;text-decoration:underline;font-family:inherit;"
            onclick="showForgotNote()">Forgot password?</button>
          &nbsp;·&nbsp;
          Don't have an account? <a href="/pages/register.html">Create one</a>
        </p>
        <p id="forgot-note"
          style="display:none;font-size:0.78rem;color:#6b7280;text-align:center;margin-top:10px;line-height:1.6;">
          Password reset is coming soon.<br />For now, please contact
          <a href="mailto:support@mealmatrix.com" style="color:#00b75c;">support@mealmatrix.com</a>
        </p>
      </form>
    </div>
  </main>

  <script src="/src/auth-header.js"></script>
  <script>
    (() => {
      const API = (window.MealMatrix && window.MealMatrix.apiBase) || "";

      const errEl = document.getElementById("login-error");
      const okEl = document.getElementById("login-success");
      const btn = document.getElementById("btn-login");

      const showErr = msg => { errEl.textContent = msg; okEl.textContent = ""; };
      const showOk = msg => { okEl.textContent = msg; errEl.textContent = ""; };

      window.showForgotNote = function () {
        const note = document.getElementById("forgot-note");
        if (note) note.style.display = note.style.display === "none" ? "block" : "none";
      };

      function setLoading(on) {
        if (!btn) return;
        btn.disabled = on;
        btn.innerHTML = on ? '<span class="auth-spinner"></span>Logging in…' : "Login";
      }

      // ── On page load: if already logged in, go home ───────────────────
      (async () => {
        try {
          const res = await window.MealMatrix.fetchWithRetry(`${API}/auth/me`, { credentials: "include" });
          if (res && res.ok) window.location.href = "/pages/home.html";
        } catch { /* ignore */ }
      })();

      const form = document.getElementById("login-form");
      if (form) {
        form.addEventListener("submit", async e => {
          e.preventDefault();
          showErr("");
          const identifier = document.getElementById("login-id").value.trim();
          const password = document.getElementById("login-pw").value;
          if (!identifier || !password) return showErr("Please fill in all fields.");

          setLoading(true);
          try {
            const res = await fetch(`${API}/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ identifier, password }),
            });
            const json = await res.json();
            if (json.success) {
              showOk("Login successful! Redirecting…");
              sessionStorage.setItem("mm_just_logged_in", "1");
              setTimeout(() => { window.location.href = "/pages/home.html"; }, 800);
            } else if (res.status === 403) {
              showErr(json.message || "Account unverified.");
              setTimeout(() => { window.location.href = "/pages/register.html"; }, 2000);
            } else {
              showErr(json.message || "Login failed. Please check your credentials.");
            }
          } catch {
            showErr("Could not reach server. Make sure the backend is running.");
          } finally {
            setLoading(false);
          }
        });
      }
    })();
  </script>
</body>

</html>
