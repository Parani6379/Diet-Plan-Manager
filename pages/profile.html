<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Profile – MealMatrix</title>
    <meta name="description" content="Set up your MealMatrix profile to get personalised nutrition goals." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #e7ecf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ── Header ── */
        .mm-header {
            height: 64px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            box-shadow: 0 1px 0 #e5e7eb;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .mm-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #1f2933;
        }

        .mm-logo-dot {
            position: relative;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 20%, #b1f4cf, #22c55e);
            box-shadow: 0 2px 10px rgba(34, 197, 94, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mm-logo-dot::after {
            content: 'MM';
            position: absolute;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.62rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.03em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .mm-user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .mm-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f59e0b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.1rem;
        }

        /* ── Page ── */
        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        /* floating food deco elements */
        .deco-items {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .deco-item {
            position: absolute;
            width: 70px;
            height: 70px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.85;
            border-radius: 12px;
            overflow: hidden;
        }

        .deco-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        /* ── Profile Card ── */
        .profile-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
        }

        .profile-card-bg {
            position: absolute;
            inset: 0;
            background: #d0e8cc;
            z-index: 0;
        }

        .profile-card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .profile-form-area {
            position: relative;
            z-index: 2;
            padding: 32px 36px 36px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(6px);
        }

        /* overlay the image with form gracefully */
        .profile-card-inner {
            position: relative;
            z-index: 2;
        }

        .profile-title {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 800;
            color: #1f2933;
            letter-spacing: 0.04em;
            margin-bottom: 22px;
            text-transform: uppercase;
        }

        .profile-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .profile-row.single {
            grid-template-columns: 1fr;
        }

        .profile-input,
        .profile-select {
            width: 100%;
            padding: 12px 16px;
            background: #b8e6c0;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.88rem;
            color: #1f2933;
            outline: none;
            transition: box-shadow .18s;
        }

        .profile-input::placeholder {
            color: #374151;
            font-weight: 500;
        }

        .profile-select {
            appearance: none;
            cursor: pointer;
            padding-right: 32px;
        }

        .profile-input:focus,
        .profile-select:focus {
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.35);
        }

        .select-wrap {
            position: relative;
        }

        .select-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #374151;
            font-size: 0.75rem;
        }

        .profile-submit-wrap {
            text-align: center;
            margin-top: 20px;
        }

        .profile-submit {
            padding: 12px 48px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.45);
            transition: transform .15s, box-shadow .15s;
        }

        .profile-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(34, 197, 94, 0.55);
        }

        .profile-msg {
            text-align: center;
            font-size: 0.82rem;
            margin-top: 12px;
            min-height: 18px;
        }

        .profile-msg.err {
            color: #dc2626;
        }

        .profile-msg.ok {
            color: #16a34a;
        }

        @media (max-width: 560px) {
            .profile-row {
                grid-template-columns: 1fr;
            }

            .profile-form-area {
                padding: 24px 20px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="mm-header">
        <a href="/" class="mm-logo">
            <div class="mm-logo-dot"></div>
            MealMatrix
        </a>
        <div class="mm-user-pill">
            <span id="header-username">VIJAYARAMANAN</span>
            <div class="mm-user-avatar">👤</div>
        </div>
    </header>

    <!-- PAGE -->
    <div class="page-wrapper">

        <!-- Decoration items (food icons around card) -->
        <div class="deco-items">
            <!-- left side -->
            <div class="deco-item" style="left:3%; top:12%; transform:rotate(-15deg)">
                <img src="/src/img/meals/salmon_veggies.png" alt="" />
            </div>
            <div class="deco-item" style="left:6%; top:42%; transform:rotate(10deg); width:55px;height:55px;">
                <img src="/src/img/meals/greek_yogurt.png" alt="" />
            </div>
            <div class="deco-item" style="left:10%; top:68%; transform:rotate(-8deg)">
                <img src="/src/img/meals/mixed_nuts.png" alt="" />
            </div>
            <div class="deco-item" style="left:18%; top:82%; transform:rotate(5deg); width:50px;height:50px;">
                <img src="/src/img/meals/oatmeal_berries.png" alt="" />
            </div>
            <!-- right side -->
            <div class="deco-item" style="right:3%; top:8%; transform:rotate(12deg)">
                <img src="/src/img/meals/quinoa_bowl.png" alt="" />
            </div>
            <div class="deco-item" style="right:7%; top:38%; transform:rotate(-10deg); width:55px;height:55px;">
                <img src="/src/img/meals/avocado_toast.png" alt="" />
            </div>
            <div class="deco-item" style="right:12%; top:65%; transform:rotate(6deg)">
                <img src="/src/img/meals/protein_balls.png" alt="" />
            </div>
            <div class="deco-item" style="right:4%; top:78%; transform:rotate(-5deg); width:50px;height:50px;">
                <img src="/src/img/meals/yogurt_parfait.png" alt="" />
            </div>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <img class="profile-card-img" src="/src/img/meals/food_bg_profile.png" alt="Healthy food background" />
            <div class="profile-form-area">
                <h1 class="profile-title">Create Profile</h1>

                <form id="profile-form" autocomplete="off" novalidate>
                    <div class="profile-row">
                        <input class="profile-input" id="p-name" type="text" placeholder="Name" required />
                        <input class="profile-input" id="p-age" type="number" placeholder="Age" required min="1"
                            max="120" />
                    </div>

                    <div class="profile-row single">
                        <div class="select-wrap">
                            <select class="profile-select" id="p-gender" required>
                                <option value="" disabled selected>Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                            <span class="select-arrow">▼</span>
                        </div>
                    </div>

                    <div class="profile-row">
                        <input class="profile-input" id="p-weight" type="number" placeholder="Weight (kg)" required
                            min="1" />
                        <input class="profile-input" id="p-height" type="number" placeholder="Height (cm)" required
                            min="1" />
                    </div>

                    <div class="profile-row single">
                        <div class="select-wrap">
                            <select class="profile-select" id="p-diet" required>
                                <option value="" disabled selected>Diet Type</option>
                                <option value="balanced">Balanced</option>
                                <option value="vegetarian">Vegetarian</option>
                                <option value="vegan">Vegan</option>
                                <option value="keto">Keto</option>
                                <option value="paleo">Paleo</option>
                                <option value="high-protein">High Protein</option>
                            </select>
                            <span class="select-arrow">▼</span>
                        </div>
                    </div>

                    <div class="profile-submit-wrap">
                        <button type="submit" class="profile-submit" id="btn-submit">SUBMIT</button>
                    </div>
                    <p class="profile-msg" id="profile-msg"></p>
                </form>
            </div>
        </div>

    </div>

    <script src="/src/auth-header.js" data-protected="true"></script>
    <script>
        (() => {
            const API = (window.MealMatrix && window.MealMatrix.apiBase) || "";

            // Load existing name if available
            (async () => {
                try {
                    const res = await window.MealMatrix.fetchWithRetry(`${API}/auth/me`, { credentials: "include" });
                    if (res && res.ok) {
                        const data = await res.json();
                        const u = data.user || data;
                        if (u.username) {
                            const nameInp = document.getElementById("p-name");
                            if (nameInp) nameInp.value = u.username;
                        }
                    }
                } catch { /* ignore */ }
            })();

            const form = document.getElementById("profile-form");
            if (form) {
                form.addEventListener("submit", async e => {
                    e.preventDefault();
                    const msg = document.getElementById("profile-msg");
                    const btn = document.getElementById("btn-submit");
                    if (!btn || !msg) return;

                    btn.disabled = true; 
                    btn.textContent = "Saving…";
                    msg.className = "profile-msg";

                    const body = {
                        name: document.getElementById("p-name").value.trim(),
                        age: parseInt(document.getElementById("p-age").value),
                        gender: document.getElementById("p-gender").value,
                        weight: parseFloat(document.getElementById("p-weight").value),
                        height: parseFloat(document.getElementById("p-height").value),
                        diet_type: document.getElementById("p-diet").value,
                    };

                    if (!body.name || !body.age || !body.gender || !body.weight || !body.height || !body.diet_type) {
                        msg.textContent = "Please fill in all fields.";
                        msg.className = "profile-msg err";
                        btn.disabled = false; 
                        btn.textContent = "SUBMIT";
                        return;
                    }

                    try {
                        const res = await fetch(`${API}/auth/profile`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            credentials: "include",
                            body: JSON.stringify(body),
                        });
                        
                        let json = {};
                        try { json = await res.json(); } catch { }

                        if (json.success) {
                            msg.textContent = "Profile saved! Calculating your body needs…";
                            msg.className = "profile-msg ok";
                            setTimeout(() => { window.location.href = "/pages/body-needs.html"; }, 1200);
                        } else {
                            msg.textContent = json.message || `Server error (${res.status}).`;
                            msg.className = "profile-msg err";
                        }
                    } catch (e) {
                        msg.textContent = "Cannot reach server.";
                        msg.className = "profile-msg err";
                    } finally {
                        btn.disabled = false; 
                        btn.textContent = "SUBMIT";
                    }
                });
            }
        })();
    </script>
</body>

</html>
